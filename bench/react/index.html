<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopBench — Ecommerce SPA</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
      header { background: #1a1a2e; color: white; padding: 1rem 2rem; }
      header h1 { font-size: 1.5rem; }
      .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
      .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
      .product-card { background: white; border-radius: 8px; padding: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
      .product-card h3 { font-size: .95rem; margin-bottom: .5rem; }
      .price { color: #e44; font-weight: bold; font-size: 1.1rem; }
      .category { font-size: .75rem; color: #888; margin-bottom: .25rem; }
      .rating { font-size: .8rem; color: #f90; }
      .btn { display: inline-block; margin-top: .75rem; padding: .4rem .9rem; background: #1a1a2e; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: .85rem; }
      .spinner { text-align: center; padding: 3rem; font-size: 1.2rem; color: #888; }
      .badge { display: inline-block; background: #e2f0ff; color: #1a5cb5; font-size: .7rem; padding: .15rem .4rem; border-radius: 3px; margin-bottom: .3rem; }
      nav { margin-bottom: 1.5rem; }
      nav a { margin-right: 1rem; color: #1a1a2e; text-decoration: none; font-weight: 500; }
      nav a:hover { text-decoration: underline; }
      .filters { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
      .filters select { padding: .4rem .7rem; border-radius: 4px; border: 1px solid #ddd; }
      .product-detail { background: white; border-radius: 8px; padding: 2rem; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
      .product-detail h2 { font-size: 1.5rem; margin-bottom: 1rem; }
      .reviews { margin-top: 2rem; }
      .review { border-top: 1px solid #eee; padding: 1rem 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
