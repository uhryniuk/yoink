name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write  # required for PyPI trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build distribution
        run: uv build

      - name: Publish to PyPI
        run: uv publish
