name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_call:

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest

    # Trusted publisher (OIDC) is the preferred approach — no long-lived token.
    # Set up at: https://pypi.org/manage/project/python-yoink/settings/publishing/
    # Add a GitHub Actions publisher pointing at this workflow.
    permissions:
      id-token: write   # required for OIDC trusted publisher
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build distribution
        run: uv build

      # Option A — OIDC trusted publisher (no secret needed, recommended):
      - name: Publish to PyPI
        run: uv publish
        env:
          UV_PUBLISH_TRUSTED_PUBLISHING: "true"

      # Option B — API token (uncomment if not using trusted publisher):
      # - name: Publish to PyPI
      #   run: uv publish
      #   env:
      #     UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
